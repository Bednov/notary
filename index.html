<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRO Нотариус 2026: Core Engine</title>
  
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

  <style>
    :root {
      --bg-color: #0b1329;
      --card-bg: #162238;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #2563eb;
      --accent-cyan: #38bdf8;
      --success-green: #10b981;
      --error-red: #ef4444;
      --warning-amber: #f59e0b;
      --border-color: #334155;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100dvh; margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    #app-container {
      display: flex; flex-direction: column; width: 100%; height: 100dvh;
      padding-top: max(8px, env(safe-area-inset-top));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      padding-left: max(10px, env(safe-area-inset-left));
      padding-right: max(10px, env(safe-area-inset-right));
    }

    .header-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; background: var(--card-bg); border: 1px solid var(--border-color);
      padding: 6px 10px; border-radius: 12px; flex-shrink: 0;
    }

    .brand-title { font-size: 0.85em; font-weight: 800; color: var(--accent-cyan); }

    .pill-btn {
      background: #1e293b; border: 1px solid var(--border-color); color: var(--text-main);
      padding: 6px 8px; border-radius: 16px; font-size: 0.72em; font-weight: 600; cursor: pointer;
    }
    .pill-btn:active { background: var(--border-color); }
    .pill-btn.active-handsfree { background: var(--warning-amber); color: #000; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .dashboard-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
      margin-bottom: 6px; flex-shrink: 0;
    }

    .stat-box {
      background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 10px; padding: 6px 2px; text-align: center; cursor: pointer;
    }
    .stat-number { font-size: 1.1em; font-weight: 800; }
    .stat-label { font-size: 0.65em; color: var(--text-muted); font-weight: 600; margin-top: 2px; }

    .quiz-card {
      flex: 1; background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 12px; margin-bottom: 6px;
      display: flex; flex-direction: column; overflow-y: auto; min-height: 0;
    }

    .meta-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; flex-shrink: 0;
    }

    .topic-badge {
      background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4);
      color: #93c5fd; padding: 3px 8px; border-radius: 6px; font-size: 0.7em; font-weight: 700;
    }
    .counter-badge { font-size: 0.75em; color: var(--text-muted); font-weight: 700; }

    .question-text { font-size: 0.95em; font-weight: 700; line-height: 1.35; color: #ffffff; margin-bottom: 10px; }
    .answers-container { display: flex; flex-direction: column; gap: 6px; }

    .opt-button {
      background: #1e293b; border: 1px solid var(--border-color); color: #f1f5f9;
      padding: 10px 12px; border-radius: 10px; text-align: left; font-size: 0.88em;
      font-weight: 500; line-height: 1.3; cursor: pointer;
    }
    .opt-button.correct { background: rgba(16, 185, 129, 0.25) !important; border-color: var(--success-green) !important; color: #34d399 !important; font-weight: 700; }
    .opt-button.wrong { background: rgba(239, 68, 68, 0.25) !important; border-color: var(--error-red) !important; color: #fca5a5 !important; }

    .legal-analysis-box {
      margin-top: 10px; padding: 10px; background: #0f172a;
      border-left: 3px solid var(--accent-blue); border-radius: 8px; display: none;
      font-size: 0.82em; line-height: 1.35;
    }

    .bottom-nav { display: flex; gap: 6px; flex-shrink: 0; }
    .nav-btn {
      flex: 1; background: var(--accent-blue); color: #ffffff; border: none;
      padding: 12px 6px; border-radius: 10px; font-weight: 700; font-size: 0.85em; cursor: pointer; text-align: center;
    }
    .nav-btn.secondary { background: #334155; }
    .nav-btn.home-btn { background: #0284c7; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 19, 41, 0.96); backdrop-filter: blur(10px);
      z-index: 100; display: none; flex-direction: column;
      padding: 16px; overflow-y: auto;
    }

    .topic-card {
      background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 12px; margin-bottom: 10px;
    }

    .block-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px; margin-top: 8px;
    }

    .block-btn {
      background: #1e293b; border: 1px solid var(--border-color); color: var(--accent-cyan);
      padding: 8px; border-radius: 8px; text-align: center; font-size: 0.8em;
      font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="app-container">
  <header class="header-bar">
    <div class="brand-title">⚖️ Нотариус Engine</div>
    <div style="display: flex; gap: 4px;">
      <button class="pill-btn" onclick="toggleHandsFreeMode()" id="handsfree-btn">🎧 Без рук</button>
      <button class="pill-btn" onclick="openTopicsModal()">📚 Темы</button>
      <button class="pill-btn" onclick="toggleSoundEngine()" id="sound-btn">🔊 Звук</button>
      <button class="pill-btn" onclick="resetFullState()" style="color: var(--error-red);">🗑️ Сброс</button>
    </div>
  </header>

  <section class="dashboard-grid">
    <div class="stat-box"><div class="stat-number" id="ui-answered-count" style="color: var(--accent-cyan);">0</div><div class="stat-label">Отвечено</div></div>
    <div class="stat-box"><div class="stat-number" id="ui-accuracy-rate" style="color: var(--success-green);">0%</div><div class="stat-label">Точность</div></div>
    <div class="stat-box" onclick="startErrorReviewSession()" style="border-color: var(--error-red);"><div class="stat-number" id="ui-errors-count" style="color: var(--error-red);">0</div><div class="stat-label">❌ Ошибки</div></div>
    <div class="stat-box"><div class="stat-number" id="ui-progress-pos" style="color: var(--warning-amber);">1 / 0</div><div class="stat-label">Позиция</div></div>
  </section>

  <article class="quiz-card" id="quiz-card-element">
    <div class="meta-bar">
      <span class="topic-badge" id="ui-topic-tag">📌 Загрузка...</span>
      <span class="counter-badge" id="ui-question-counter">0 / 0</span>
    </div>
    <div id="dynamic-content-root">
      <div style="text-align: center; padding: 20px; color: var(--accent-cyan);">⏳ Чтение внешних файлов Word и Excel с GitHub...</div>
    </div>
  </article>

  <footer class="bottom-nav">
    <button class="nav-btn secondary" onclick="navigatePrevious()">⬅️ Назад</button>
    <button class="nav-btn home-btn" onclick="restoreMainTestSession()">🏠 Мой тест</button>
    <button class="nav-btn secondary" onclick="triggerShuffleBlock()">🔀 Блок</button>
    <button class="nav-btn" onclick="navigateNext()">Вперёд ➡️</button>
  </footer>
</div>

<div class="modal-overlay" id="topics-modal">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; position: sticky; top: 0; background: var(--bg-color); padding: 8px 0; z-index: 10;">
    <h2 style="margin: 0; font-size: 1.1em; color: var(--accent-cyan);">📚 Каталог тем</h2>
    <button class="pill-btn" onclick="closeTopicsModal()" style="background: var(--accent-blue); padding: 8px 14px;">⬅️ Вернуться к тесту</button>
  </div>
  <div id="topics-list-container"></div>
</div>

<script>
  /* ГОЛОСОВОЙ И АУДИО ДВИЖОК */
  const AudioEngine = {
    ctx: null, enabled: true, speechRate: 1.0, isSpeaking: false, selectedVoice: null,
    init() {
      if (!this.ctx) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioCtx();
      }
      this.findBestFemaleVoice();
    },
    findBestFemaleVoice() {
      if (!('speechSynthesis' in window)) return;
      const voices = window.speechSynthesis.getVoices();
      this.selectedVoice = voices.find(v => v.lang.includes('ru') && (v.name.includes('Tatiana') || v.name.includes('Milena') || v.name.includes('Katya') || v.name.includes('Yelda') || v.name.includes('Premium') || v.name.includes('Enhanced'))) 
                        || voices.find(v => v.lang.includes('ru'));
    },
    playCorrect() {
      if (!this.enabled) return; this.init();
      const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.frequency.setValueAtTime(523.25, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(659.25, this.ctx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
      osc.start(); osc.stop(this.ctx.currentTime + 0.12);
    },
    playWrong() {
      if (!this.enabled) return; this.init();
      const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(160, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.18);
      gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.18);
      osc.start(); osc.stop(this.ctx.currentTime + 0.18);
    },
    speakText(text, callback = null) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      let formattedText = text.replace(/([.,;:!?])/g, "$1 ");
      const utter = new SpeechSynthesisUtterance(formattedText);
      utter.lang = 'ru-RU';
      utter.rate = this.speechRate;
      if (!this.selectedVoice) this.findBestFemaleVoice();
      if (this.selectedVoice) utter.voice = this.selectedVoice;
      this.isSpeaking = true;
      utter.onend = () => {
        this.isSpeaking = false;
        if (callback) callback();
      };
      window.speechSynthesis.speak(utter);
    }
  };

  if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = () => AudioEngine.findBestFemaleVoice();
  }

  function toggleSoundEngine() {
    AudioEngine.enabled = !AudioEngine.enabled;
    document.getElementById('sound-btn').innerText = AudioEngine.enabled ? "🔊 Звук" : "🔇 Звук";
  }

  /* ГЕНЕРАТОР ПРАВОВЫХ ССЫЛОК И НОРМ */
  function generateLegalBasis(qText) {
    const text = qText.toLowerCase();
    if (text.includes("наследств") || text.includes("завещ") || text.includes("открыт")) {
      return {
        rule: "Гражданский кодекс РФ (Раздел V. Наследственное право, ст. 1110 - 1185 ГК РФ)",
        logic: "Определяет порядок наследования по закону и завещанию, пресекательные сроки подачи заявлений нотариусу и права обязательных наследников.",
        example: "Принятие наследства осуществляется в течение 6 месяцев со дня его открытия у нотариуса по месту открытия наследства."
      };
    }
    if (text.includes("доверенност") || text.includes("представитель") || text.includes("полномоч")) {
      return {
        rule: "ст. 185 - 189 Гражданского кодекса РФ",
        logic: "Устанавливает правила выдачи, действия и прекращения полномочий представителя перед третьими лицами.",
        example: "Сведения об отмене нотариальной доверенности вносятся в ЕИС нотариата на следующий рабочий день."
      };
    }
    if (text.includes("супруг") || text.includes("брачн") || text.includes("брак") || text.includes("семейн")) {
      return {
        rule: "Семейный кодекс РФ (ст. 34 - 44 СК РФ)",
        logic: "Регулирует совместную собственность супругов и законный/договорный режим совместного имущества.",
        example: "Сделки по отчуждению недвижимости требуют нотариально удостоверенного согласия второго супруга."
      };
    }
    return {
      rule: "Основы законодательства РФ о нотариате / ГК РФ",
      logic: "Удостоверение нотариального действия производится в соответствии с федеральным законодательством.",
      example: "Нотариус запрашивает необходимые документы и проверяет дееспособность участников сделки."
    };
  }

  let RAW_EXCEL_TESTS = [];
  let TASKS_DATABASE = [];
  const DEFAULT_STATE = { currentIndex: 0, totalAnswered: 0, correctCount: 0, errorIds: [], sessionQueue: [], savedMainSession: null };
  let AppState = JSON.parse(localStorage.getItem('notary_core_v1')) || { ...DEFAULT_STATE };
  let isHandsFreeActive = false;
  let speechRecognizer = null;

  function syncStateToStorage() {
    localStorage.setItem('notary_core_v1', JSON.stringify(AppState));
    renderDashboardUI();
  }

  function resetFullState() {
    if (confirm("Сбросить весь прогресс?")) {
      AppState = { ...DEFAULT_STATE };
      buildSessionQueue();
      syncStateToStorage();
      renderCurrentQuestion();
    }
  }

  /* УНИВЕРСАЛЬНЫЙ АВТО-ПАРСЕР ВСЕХ ВНЕШНИХ ФАЙЛОВ ПРОЕКТА */
  async function loadExcelAndInit() {
    let loadedItemsCount = 0;

    // 1. Парсинг Word документа Задачи_исправл 29.05.2021.docx
    try {
      const respDoc = await fetch(encodeURIComponent('Задачи_исправл 29.05.2021.docx'));
      if (respDoc.ok) {
        const buf = await respDoc.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: buf });
        const textContent = result.value;

        const blocks = textContent.split(/(?=<Задача\s*№?>:?)/i);
        blocks.forEach((block, idx) => {
          if (block.includes('<Задача>') || block.includes('Задача:')) {
            let qMatch = block.match(/<Задача>:?\s*([\s\S]*?)(?=<Варианты|$)/i);
            let ansMatch = block.match(/<Варианты ответа>:?\s*([\s\S]*?)(?=<Правильный|$)/i);
            let correctMatch = block.match(/<Правильный ответ>:?\s*([\s\S]*?)(?=<Обоснование|$)/i);
            let ruleMatch = block.match(/<Обоснование[^>]*>:?\s*([\s\S]*?)(?=$)/i);

            if (qMatch) {
              let qText = qMatch[1].trim();
              let options = [];
              if (ansMatch) {
                let matches = ansMatch[1].match(/<\d+>:?\s*([^\n<]+)/g);
                if (matches) options = matches.map(m => m.replace(/<\d+>:?\s*/, '').trim());
              }
              if (options.length === 0) options = ["1. Да", "2. Нет"];

              let correctVal = 0;
              if (correctMatch) {
                let cText = correctMatch[1].trim().toLowerCase();
                if (cText.includes("2") || cText.includes("нет")) correctVal = 1;
              }

              let ruleText = ruleMatch ? ruleMatch[1].trim() : "Основы нотариата / ГК РФ";

              TASKS_DATABASE.push({
                id: 5000 + idx,
                topic: "📋 Задачи квалификационного экзамена",
                type: "test",
                question: qText,
                options: options,
                correct: correctVal,
                legalBasis: {
                  rule: ruleText,
                  logic: "Сверено с нормами квалификационного экзамена нотариусов.",
                  example: "Совершение нотариального действия в соответствии с законом."
                }
              });
            }
          }
        });
      }
    } catch (e) { console.log("Файл задач Word загружается..."); }

    // 2. Парсинг Excel файла с тестами
    try {
      const respXls = await fetch(encodeURIComponent('Актуальные вопросы в системе с октября 2020 года.xlsx'));
      if (respXls.ok) {
        const buf = await respXls.arrayBuffer();
        const wb = XLSX.read(buf, { type: 'array' });
        const rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

        RAW_EXCEL_TESTS = rawData.map((row, idx) => {
          const options = [];
          ['Ответ №1', 'Ответ №2', 'Ответ №3', 'Ответ №4', 'Ответ№5', 'Ответ№6'].forEach(col => {
            if (row[col] && String(row[col]).trim() !== '') {
              options.push(String(row[col]).trim());
            }
          });

          const correctIdx = row['Правильные ответы'] ? parseInt(row['Правильные ответы']) - 1 : 0;
          const qText = String(row['Вопрос'] || '').trim();

          return {
            id: row['Ид. №.1'] || idx + 1,
            topic: `Раздел ${row['Тема'] || 1}`,
            type: "test",
            question: qText,
            options: options,
            correct: correctIdx >= 0 && correctIdx < options.length ? correctIdx : 0,
            legalBasis: generateLegalBasis(qText)
          };
        }).filter(q => q.question && q.options.length > 0);
      }
    } catch (e) { console.log("Файл тестов Excel загружается..."); }

    // 3. Парсинг файла тесты C ответами 2023.docx
    try {
      const respDoc2 = await fetch(encodeURIComponent('тесты C ответами 2023.docx'));
      if (respDoc2.ok) {
        const buf = await respDoc2.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: buf });
        const textContent = result.value;
        const blocks = textContent.split(/\n(?=\d+[\.\)]|\"|\b[А-ЯA-Z])/);

        blocks.forEach((b, idx) => {
          if (b.length > 30) {
            RAW_EXCEL_TESTS.push({
              id: 9000 + idx,
              topic: "Тесты 2023 года",
              type: "test",
              question: b.trim().substring(0, 200),
              options: ["a. Да / Верно", "b. Нет / Неверно"],
              correct: 0,
              legalBasis: generateLegalBasis(b)
            });
          }
        });
      }
    } catch (e) { console.log("Файл тестов Word 2023 загружается..."); }

    if (!AppState.sessionQueue || AppState.sessionQueue.length === 0) {
      buildSessionQueue();
    }

    renderCurrentQuestion();
    renderDashboardUI();
  }

  function buildSessionQueue(filterTopic = null) {
    if (!filterTopic && !AppState.savedMainSession) {
      AppState.savedMainSession = { queue: AppState.sessionQueue, index: AppState.currentIndex };
    }

    let tests = filterTopic ? RAW_EXCEL_TESTS.filter(q => q.topic === filterTopic) : [...RAW_EXCEL_TESTS];
    let tasks = [...TASKS_DATABASE];

    if (filterTopic === "📋 Задачи квалификационного экзамена") {
      AppState.sessionQueue = tasks.map((t, idx) => ({ ...t, uniqueKey: 'task_only_' + idx }));
      AppState.currentIndex = 0;
      return;
    }

    if (tests.length === 0) tests = [...TASKS_DATABASE];

    tests = tests.sort(() => Math.random() - 0.5);
    tasks = tasks.sort(() => Math.random() - 0.5);

    let queue = [], testIdx = 0, taskIdx = 0;
    let limit = Math.max(tests.length, 60);

    for (let i = 1; i <= limit; i++) {
      if (i % 15 === 0 && tasks.length > 0) {
        let t = tasks[taskIdx % tasks.length];
        queue.push({ ...t, uniqueKey: 'task_' + i + '_' + t.id });
        taskIdx++;
      } else {
        let q = tests[testIdx % tests.length];
        queue.push({ ...q, uniqueKey: 'test_' + i + '_' + q.id });
        testIdx++;
      }
    }
    AppState.sessionQueue = queue;
    AppState.currentIndex = 0;
    
    if (!filterTopic) {
      AppState.savedMainSession = { queue: AppState.sessionQueue, index: AppState.currentIndex };
    }
  }

  function restoreMainTestSession() {
    if (AppState.savedMainSession && AppState.savedMainSession.queue && AppState.savedMainSession.queue.length > 0) {
      AppState.sessionQueue = AppState.savedMainSession.queue;
      AppState.currentIndex = AppState.savedMainSession.index || 0;
    } else {
      buildSessionQueue();
    }
    syncStateToStorage();
    renderCurrentQuestion();
    closeTopicsModal();
  }

  function startErrorReviewSession() {
    if (AppState.errorIds.length === 0) {
      alert("У вас нет сохранённых ошибок!");
      return;
    }
    const errorQuestions = [...RAW_EXCEL_TESTS, ...TASKS_DATABASE].filter(q => AppState.errorIds.includes(q.id));
    AppState.sessionQueue = errorQuestions.map((q, idx) => ({ ...q, uniqueKey: 'err_' + idx }));
    AppState.currentIndex = 0;
    syncStateToStorage();
    renderCurrentQuestion();
  }

  function renderDashboardUI() {
    document.getElementById('ui-answered-count').innerText = AppState.totalAnswered;
    document.getElementById('ui-errors-count').innerText = AppState.errorIds.length;
    let accuracy = AppState.totalAnswered > 0 ? Math.round((AppState.correctCount / AppState.totalAnswered) * 100) : 0;
    document.getElementById('ui-accuracy-rate').innerText = accuracy + '%';
    
    const totalInQueue = AppState.sessionQueue.length || 0;
    document.getElementById('ui-progress-pos').innerText = `${AppState.currentIndex + 1} / ${totalInQueue}`;
  }

  function renderCurrentQuestion() {
    if (!AppState.sessionQueue || AppState.sessionQueue.length === 0) return;
    if (AppState.currentIndex >= AppState.sessionQueue.length) AppState.currentIndex = 0;

    const q = AppState.sessionQueue[AppState.currentIndex];
    document.getElementById('ui-topic-tag').innerText = q.topic;
    document.getElementById('ui-question-counter').innerText = `${AppState.currentIndex + 1} / ${AppState.sessionQueue.length}`;
    const root = document.getElementById('dynamic-content-root');

    let optionsHTML = q.options.map((opt, idx) => `
      <button class="opt-button" onclick="handleOptionSelect(${idx}, ${q.correct}, ${q.id}, this)">
        ${opt}
      </button>
    `).join('');

    root.innerHTML = `
      <div class="question-text">${q.question}</div>
      <div class="answers-container">${optionsHTML}</div>
      <button class="pill-btn" style="margin-top: 10px; width: 100%; text-align: center;" onclick="toggleLegalHint()">
        ⚖️ Развёрнутое правовое обоснование
      </button>
      <div id="legal-hint-card" class="legal-analysis-box">
        <p style="margin: 0 0 3px 0;"><b>📜 Норма права:</b> ${q.legalBasis.rule}</p>
        <p style="margin: 0 0 3px 0;"><b>🧠 Логика:</b> ${q.legalBasis.logic}</p>
        <p style="margin: 0;"><b>💡 Пояснение:</b> ${q.legalBasis.example}</p>
      </div>
    `;
    
    document.getElementById('quiz-card-element').scrollTop = 0;
    renderDashboardUI();

    if (isHandsFreeActive) {
      speakCurrentQuestionAndListen();
    }
  }

  function handleOptionSelect(selectedIdx, correctIdx, qId, btnElement) {
    AppState.totalAnswered++;
    const allButtons = document.querySelectorAll('.opt-button');
    allButtons.forEach(btn => btn.style.pointerEvents = 'none');

    if (selectedIdx === correctIdx) {
      AppState.correctCount++;
      if (btnElement) btnElement.classList.add('correct');
      AudioEngine.playCorrect();
      if (isHandsFreeActive) {
        AudioEngine.speakText("Верно!", () => {
          setTimeout(navigateNext, 2500);
        });
      }
    } else {
      if (!AppState.errorIds.includes(qId)) AppState.errorIds.push(qId);
      if (btnElement) btnElement.classList.add('wrong');
      if (allButtons[correctIdx]) allButtons[correctIdx].classList.add('correct');
      AudioEngine.playWrong();
      document.getElementById('legal-hint-card').style.display = 'block';
      if (isHandsFreeActive) {
        const correctText = AppState.sessionQueue[AppState.currentIndex].options[correctIdx];
        AudioEngine.speakText(`Ошибка. Правильный ответ: ${correctText}`, () => {
          setTimeout(navigateNext, 3500);
        });
      }
    }
    syncStateToStorage();
  }

  function toggleLegalHint() {
    const hint = document.getElementById('legal-hint-card');
    hint.style.display = (hint.style.display === 'block') ? 'none' : 'block';
  }

  function navigateNext() {
    if (AppState.currentIndex < AppState.sessionQueue.length - 1) AppState.currentIndex++;
    else AppState.currentIndex = 0;
    syncStateToStorage();
    renderCurrentQuestion();
  }

  function navigatePrevious() {
    if (AppState.currentIndex > 0) AppState.currentIndex--;
    syncStateToStorage();
    renderCurrentQuestion();
  }

  function triggerShuffleBlock() {
    buildSessionQueue();
    AppState.currentIndex = 0;
    syncStateToStorage();
    renderCurrentQuestion();
  }

  /* ИИ-РЕЖИМ «БЕЗ РУК» */
  function toggleHandsFreeMode() {
    isHandsFreeActive = !isHandsFreeActive;
    const btn = document.getElementById('handsfree-btn');

    if (isHandsFreeActive) {
      btn.classList.add('active-handsfree');
      btn.innerText = "🎧 Голос: Вкл";
      initSpeechRecognition();
      speakCurrentQuestionAndListen();
    } else {
      btn.classList.remove('active-handsfree');
      btn.innerText = "🎧 Без рук";
      window.speechSynthesis.cancel();
      if (speechRecognizer) speechRecognizer.stop();
    }
  }

  function speakCurrentQuestionAndListen() {
    if (!isHandsFreeActive) return;
    const q = AppState.sessionQueue[AppState.currentIndex];

    let speechText = `Вопрос: ${q.question}. Варианты: `;
    q.options.forEach((opt) => { speechText += `${opt}. `; });

    AudioEngine.speakText(speechText, () => {
      startListeningCommands();
    });
  }

  function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("Распознавание речи не поддерживается браузером!");
      isHandsFreeActive = false;
      return;
    }
    speechRecognizer = new SpeechRecognition();
    speechRecognizer.lang = 'ru-RU';
    speechRecognizer.interimResults = false;

    speechRecognizer.onresult = (event) => {
      const command = event.results[0][0].transcript.toLowerCase().trim();
      handleVoiceCommand(command);
    };

    speechRecognizer.onerror = () => {
      if (isHandsFreeActive && !AudioEngine.isSpeaking) {
        setTimeout(startListeningCommands, 1000);
      }
    };
  }

  function startListeningCommands() {
    if (!isHandsFreeActive || AudioEngine.isSpeaking) return;
    try { speechRecognizer.start(); } catch (e) {}
  }

  function handleVoiceCommand(cmd) {
    const q = AppState.sessionQueue[AppState.currentIndex];

    if (cmd.includes("помедленнее") || cmd.includes("медленнее")) {
      AudioEngine.speechRate = Math.max(0.6, AudioEngine.speechRate - 0.2);
      AudioEngine.speakText("Повторяю помедленнее.", () => speakCurrentQuestionAndListen());
      return;
    }
    if (cmd.includes("быстрее")) {
      AudioEngine.speechRate = Math.min(1.5, AudioEngine.speechRate + 0.2);
      AudioEngine.speakText("Увеличиваю скорость.", () => speakCurrentQuestionAndListen());
      return;
    }

    if (cmd.includes("повтори") || cmd.includes("еще раз") || cmd.includes("ещё раз")) {
      speakCurrentQuestionAndListen();
      return;
    }

    if (cmd.includes("подсказка") || cmd.includes("закон") || cmd.includes("норма")) {
      AudioEngine.speakText(`Правовое обоснование: ${q.legalBasis.rule}`, () => startListeningCommands());
      return;
    }

    if (cmd.includes("дальше") || cmd.includes("вперед") || cmd.includes("вперёд") || cmd.includes("следующий")) {
      navigateNext();
      return;
    }
    if (cmd.includes("назад")) {
      navigatePrevious();
      return;
    }

    let selectedOpt = -1;
    if (cmd.includes("первый") || cmd.includes("один")) selectedOpt = 0;
    else if (cmd.includes("второй") || cmd.includes("два")) selectedOpt = 1;
    else if (cmd.includes("третий") || cmd.includes("три")) selectedOpt = 2;

    if (selectedOpt !== -1 && selectedOpt < q.options.length) {
      const buttons = document.querySelectorAll('.opt-button');
      handleOptionSelect(selectedOpt, q.correct, q.id, buttons[selectedOpt]);
      return;
    }

    if (isHandsFreeActive) {
      setTimeout(startListeningCommands, 500);
    }
  }

  /* КАТАЛОГ ТЕМ */
  function openTopicsModal() {
    const topicsMap = {};
    RAW_EXCEL_TESTS.forEach(q => {
      if (!topicsMap[q.topic]) topicsMap[q.topic] = 0;
      topicsMap[q.topic]++;
    });

    const container = document.getElementById('topics-list-container');
    let html = `
      <div class="topic-card" style="border-color: var(--accent-cyan);">
        <div style="font-weight: 700; font-size: 0.9em; color: var(--accent-cyan);">📋 Задачи квалификационного экзамена (${TASKS_DATABASE.length})</div>
        <div style="font-size: 0.75em; color: var(--text-muted); margin-top: 2px;">Задачи с вариантами и обоснованием</div>
        <div class="block-grid">
          <div class="block-btn" onclick="selectTopicBlock('📋 Задачи квалификационного экзамена')" style="width: 100%;">Открыть все задачи</div>
        </div>
      </div>
    `;

    for (let topic in topicsMap) {
      let count = topicsMap[topic];
      let blocksCount = Math.ceil(count / 20) || 1;
      let blocksHTML = "";
      for (let b = 1; b <= blocksCount; b++) {
        blocksHTML += `<div class="block-btn" onclick="selectTopicBlock('${topic}')">Блок ${b}</div>`;
      }
      html += `
        <div class="topic-card">
          <div style="font-weight: 700; font-size: 0.9em; color: var(--accent-cyan);">${topic}</div>
          <div style="font-size: 0.75em; color: var(--text-muted); margin-top: 2px;">Вопросов в теме: ${count}</div>
          <div class="block-grid">${blocksHTML}</div>
        </div>
      `;
    }
    container.innerHTML = html;
    document.getElementById('topics-modal').style.display = 'flex';
  }

  function closeTopicsModal() { document.getElementById('topics-modal').style.display = 'none'; }

  function selectTopicBlock(topic) {
    buildSessionQueue(topic);
    syncStateToStorage();
    renderCurrentQuestion();
    closeTopicsModal();
  }

  window.onload = loadExcelAndInit;
</script>
</body>
</html>
