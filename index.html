<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRO Нотариус: Smart-Тренажёр</title>
  <style>
    :root {
      --bg-color: #0b1329;
      --card-bg: #162238;
      --text-color: #f8fafc;
      --accent-color: #2563eb;
      --success-color: #10b981;
      --error-color: #ef4444;
      --border-color: #334155;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100dvh; margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif;
      overflow: hidden;
    }

    .app-container {
      display: flex; flex-direction: column; height: 100dvh;
      padding-top: max(6px, env(safe-area-inset-top));
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      padding-left: max(10px, env(safe-area-inset-left));
      padding-right: max(10px, env(safe-area-inset-right));
    }

    .top-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 6px; }
    .btn-ctrl {
      background: #1e293b; color: #38bdf8; border: 1px solid #334155;
      padding: 6px 2px; border-radius: 8px; font-size: 0.72em; font-weight: 700; text-align: center;
      cursor: pointer;
    }

    .stats-card {
      background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 10px; padding: 6px; margin-bottom: 6px;
      display: flex; justify-content: space-around; text-align: center;
    }
    .stat-val { font-size: 1.1em; font-weight: 800; }
    .stat-lbl { font-size: 0.65em; color: #94a3b8; font-weight: 600; }

    .content-area {
      flex: 1; background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 10px; margin-bottom: 6px;
      display: flex; flex-direction: column; overflow-y: auto;
    }

    .question-title { font-size: 0.92em; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    .options-grid { display: flex; flex-direction: column; gap: 6px; }

    .btn {
      background: var(--accent-color); color: white; border: none; padding: 9px;
      border-radius: 8px; font-weight: 700; font-size: 0.88em; width: 100%; text-align: center;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.98); }

    .option-btn {
      background: #1e293b; border: 1px solid var(--border-color); color: #f1f5f9;
      text-align: left; font-weight: 500; font-size: 0.85em; line-height: 1.25; padding: 8px 10px;
    }

    .option-btn.correct-ans { background: rgba(16, 185, 129, 0.25) !important; border-color: var(--success-color) !important; color: #4ade80 !important; }
    .option-btn.wrong-ans { background: rgba(239, 68, 68, 0.25) !important; border-color: var(--error-color) !important; color: #f87171 !important; }

    .hint-box {
      margin-top: 8px; padding: 8px; background: #1e293b;
      border-left: 3px solid var(--accent-color); border-radius: 6px; display: none; font-size: 0.8em; line-height: 1.3;
    }

    .nav-bar { display: flex; gap: 6px; }
    .topic-tag { display: inline-block; background: #3b82f622; color: #60a5fa; padding: 2px 6px; border-radius: 4px; font-size: 0.7em; margin-bottom: 4px; font-weight: 600; }
    
    .task-input {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      color: #fff; border-radius: 8px; padding: 8px; font-size: 0.85em;
      margin-top: 6px; margin-bottom: 6px; resize: none; font-family: inherit;
    }
    .task-input:focus { outline: none; border-color: #38bdf8; }
  </style>
</head>
<body>

<div class="app-container">
  
  <div class="top-controls">
    <div class="btn-ctrl" onclick="shuffleCurrentBlock()">🔀 Блок (20)</div>
    <div class="btn-ctrl" style="color: #f87171;" onclick="shuffleErrors()">⚠️ Ошибки</div>
    <div class="btn-ctrl" style="color: #a78bfa;" onclick="shuffleAllQuestions()">💥 Вся база</div>
    <div class="btn-ctrl" id="sound-btn" onclick="toggleSound()">🔊 Звук: Вкл</div>
  </div>

  <div class="stats-card">
    <div><div class="stat-val" id="stat-total" style="color: #38bdf8;">0</div><div class="stat-lbl">Отвечено</div></div>
    <div><div class="stat-val" id="stat-accuracy" style="color: #4ade80;">0%</div><div class="stat-lbl">Точность</div></div>
    <div><div class="stat-val" id="stat-errors" style="color: #f87171;">0</div><div class="stat-lbl">Ошибок</div></div>
    <div><div class="stat-val" id="stat-day" style="color: #f59e0b;">1/60</div><div class="stat-lbl">День</div></div>
  </div>

  <div style="font-size: 0.72em; color: #94a3b8; margin-bottom: 4px; display: flex; justify-content: space-between; font-weight: 600;">
    <span id="mode-text">Режим: Вся база</span>
    <span id="counter-text">0 / 0</span>
  </div>

  <div class="content-area" id="content-area"></div>

  <div class="nav-bar">
    <button class="btn" style="background: #334155;" onclick="prevQuestion()">⬅️ Назад</button>
    <button class="btn" onclick="nextQuestion()">Вперёд ➡️</button>
  </div>

  <div style="display: flex; gap: 10px; margin-top: 4px;">
    <button onclick="exportAnalytics()" style="background: none; border: none; color: #38bdf8; font-size: 0.68em; flex: 1;">📊 Выгрузить данные для ИИ</button>
    <button onclick="resetStats()" style="background: none; border: none; color: #64748b; font-size: 0.68em; flex: 1;">🗑️ Сброс</button>
  </div>

</div>

<script>
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  let soundEnabled = true;

  function playSound(type) {
    if (!soundEnabled) return;
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(659.25, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    } else {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(180, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('sound-btn').innerText = soundEnabled ? "🔊 Звук: Вкл" : "🔇 Звук: Выкл";
  }

  const allQuestionsData = [
    { id: 1, topic: "Организация нотариата", type: "test", question: "Каковы требования к юридическому стажу для назначения временно исполняющим обязанности (врио) нотариуса?", options: ["Не менее 3 лет", "Не менее 5 лет", "Не менее 1 года"], correct: 1, legalBasis: { rule: "ст. 20 Основ о нотариате", logic: "Врио выполняет все функции нотариуса.", example: "Нужен стаж от 5 лет." } },
    { id: 2, topic: "Организация нотариата", type: "test", question: "Какой срок действия результатов квалификационного экзамена при отсутствии назначения на должность?", options: ["1 год", "3 года", "5 лет"], correct: 1, legalBasis: { rule: "ст. 3.1 Основ о нотариате", logic: "Законы обновляются.", example: "Действует 3 года." } },
    { id: 3, topic: "Наследство", type: "test", question: "Срок для принятия наследства по закону?", options: ["3 месяца", "6 месяцев", "1 год"], correct: 1, legalBasis: { rule: "ст. 1154 ГК РФ", logic: "Базовый срок для поиска наследников.", example: "6 месяцев со дня открытия." } },
    { id: 4, topic: "Доверенности", type: "test", question: "Максимальный срок действия доверенности по ГК РФ?", options: ["3 года", "5 лет", "Не ограничен"], correct: 2, legalBasis: { rule: "ст. 186 ГК РФ", logic: "Ограничение в 3 года отменено.", example: "Если срок не указан, сохраняет силу 1 год." } },
    { id: 20, topic: "Наследство", type: "task", title: "Практическая задача: Обязательная доля", scenario: "Умер гражданин К., завещав всё имущество другу. У него осталась дочь-инвалид (58 лет). Права дочери и действия нотариуса?", solution: { rule: "ст. 1149 ГК РФ", logic: "Нетрудоспособные дети наследуют не менее половины доли, которая причиталась бы им по закону.", action: "Разъяснить право на обязательную долю и выдать свидетельство." } }
  ];

  let currentList = [];
  let currentIndex = 0;
  let isAnswered = false;
  let userStats = JSON.parse(localStorage.getItem('notary_stats_v3')) || { totalAnswered: 0, correctCount: 0, errorIds: [], topicStats: {} };

  function saveStats() {
    localStorage.setItem('notary_stats_v3', JSON.stringify(userStats));
    updateStatsUI();
  }

  function updateStatsUI() {
    document.getElementById('stat-total').innerText = userStats.totalAnswered;
    document.getElementById('stat-errors').innerText = userStats.errorIds.length;
    let acc = userStats.totalAnswered > 0 ? Math.round((userStats.correctCount / userStats.totalAnswered) * 100) : 0;
    document.getElementById('stat-accuracy').innerText = acc + '%';
  }

  function shuffle(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function shuffleCurrentBlock() {
    let unlearnedErrors = allQuestionsData.filter(q => userStats.errorIds.includes(q.id));
    let regularQuestions = shuffle(allQuestionsData.filter(q => !userStats.errorIds.includes(q.id))).slice(0, 20 - unlearnedErrors.length);
    currentList = shuffle([...unlearnedErrors, ...regularQuestions]);
    currentIndex = 0;
    document.getElementById('mode-text').innerText = "Режим: Блок (с повтором ошибок)";
    renderQuestion();
  }

  function shuffleAllQuestions() {
    currentList = shuffle(allQuestionsData);
    currentIndex = 0;
    document.getElementById('mode-text').innerText = "Режим: Вся база";
    renderQuestion();
  }

  function shuffleErrors() {
    let errs = allQuestionsData.filter(q => userStats.errorIds.includes(q.id));
    if (errs.length === 0) { alert("Ошибок пока нет!"); return; }
    currentList = shuffle(errs); currentIndex = 0;
    document.getElementById('mode-text').innerText = "Режим: Ошибки";
    renderQuestion();
  }

  function renderQuestion() {
    isAnswered = false;
    if (!currentList || currentList.length === 0) currentList = [...allQuestionsData];
    
    const q = currentList[currentIndex];
    document.getElementById('counter-text').innerText = `${currentIndex + 1} / ${currentList.length}`;
    const area = document.getElementById('content-area');

    if (q.type === "task") {
      area.innerHTML = `
        <span class="topic-tag">🏛️ ${q.topic || "Практика"}</span>
        <div style="background:#0f172a; border:1px dashed #2563eb; padding:10px; border-radius:8px;">
          <h3 style="margin:0 0 6px 0; color:#38bdf8; font-size:0.9em;">📋 ${q.title}</h3>
          <p style="line-height:1.3; color:#cbd5e1; font-size:0.82em; margin-bottom:8px;">${q.scenario}</p>
          
          <label style="font-size:0.75em; color:#94a3b8; font-weight:600;">Введите или надиктуйте ответ (🎙️ на клавиатуре):</label>
          <textarea id="task-user-input" class="task-input" rows="3" placeholder="Ваше решение задачи..."></textarea>
          
          <button class="btn" style="padding:8px; background:#0284c7;" onclick="submitTaskAnswer()">⚖️ Проверить ответ</button>
          
          <div id="task-sol" style="display:none; margin-top:10px; font-size:0.8em; line-height:1.35; border-top:1px solid #334155; padding-top:8px;">
            <p style="margin:2px 0; color:#38bdf8;"><b>Ваш ответ:</b> <span id="user-ans-text" style="color:#fff;"></span></p>
            <p style="margin:4px 0 2px 0;"><b>📜 Норма:</b> ${q.solution.rule}</p>
            <p style="margin:2px 0;"><b>🧠 Логика:</b> ${q.solution.logic}</p>
            <p style="margin:2px 0;"><b>💡 Действия:</b> ${q.solution.action}</p>
            <div style="display:flex; gap:6px; margin-top:8px;">
              <button class="btn" style="background:#10b981; padding:8px; flex:1;" onclick="markTask(true, ${q.id})">✅ Решил верно</button>
              <button class="btn" style="background:#ef4444; padding:8px; flex:1;" onclick="markTask(false, ${q.id})">❌ В ошибки</button>
            </div>
          </div>
        </div>`;
    } else {
      area.innerHTML = `
        <span class="topic-tag">📌 ${q.topic || "Общий раздел"}</span>
        <div class="question-title">${q.question}</div>
        <div class="options-grid" id="options-container"></div>
        <button class="btn" style="background:#334155; margin-top:8px; padding:6px;" onclick="toggleHint()">⚖️ Правовое обоснование</button>
        <div id="hint-box" class="hint-box">
          <p style="margin:0 0 2px 0;"><b>📜 Норма:</b> ${q.legalBasis.rule}</p>
          <p style="margin:0 0 2px 0;"><b>🧠 Логика:</b> ${q.legalBasis.logic}</p>
          <p style="margin:0;"><b>💡 Пример:</b> ${q.legalBasis.example}</p>
        </div>`;

      const container = document.getElementById('options-container');
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'btn option-btn';
        btn.innerText = `${idx + 1}. ${opt}`;
        btn.onclick = (e) => checkAnswer(idx, q.correct, q.id, q.topic, e.target);
        container.appendChild(btn);
      });
    }
    updateStatsUI();
  }

  function submitTaskAnswer() {
    const inputVal = document.getElementById('task-user-input').value.trim();
    if (!inputVal) {
      alert("Пожалуйста, введите или надиктуйте ответ перед проверкой!");
      return;
    }
    document.getElementById('user-ans-text').innerText = inputVal;
    document.getElementById('task-sol').style.display = 'block';
  }

  function checkAnswer(selected, correct, qId, topic, targetBtn) {
    if (isAnswered) return;
    isAnswered = true;
    userStats.totalAnswered++;

    if (!userStats.topicStats[topic]) userStats.topicStats[topic] = { total: 0, correct: 0 };
    userStats.topicStats[topic].total++;

    const allBtns = document.querySelectorAll('.option-btn');

    if (selected === correct) {
      userStats.correctCount++;
      userStats.topicStats[topic].correct++;
      targetBtn.classList.add('correct-ans');
      playSound('correct');
      saveStats();
      setTimeout(() => { nextQuestion(); }, 600);
    } else {
      if (!userStats.errorIds.includes(qId)) userStats.errorIds.push(qId);
      targetBtn.classList.add('wrong-ans');
      if (allBtns[correct]) allBtns[correct].classList.add('correct-ans');
      playSound('wrong');
      document.getElementById('hint-box').style.display = 'block';
      saveStats();
    }
  }

  function markTask(success, qId) {
    userStats.totalAnswered++;
    if (success) {
      userStats.correctCount++;
      userStats.errorIds = userStats.errorIds.filter(id => id !== qId);
      playSound('correct');
    } else {
      if (!userStats.errorIds.includes(qId)) userStats.errorIds.push(qId);
      playSound('wrong');
    }
    saveStats(); nextQuestion();
  }

  function toggleHint() {
    const box = document.getElementById('hint-box');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  }

  function nextQuestion() { if (currentIndex < currentList.length - 1) { currentIndex++; renderQuestion(); } }
  function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderQuestion(); } }

  function exportAnalytics() {
    let report = `АНАЛИТИКА ТРЕНОЖЕРА НОТАРИУСА:\n`;
    report += `Всего ответов: ${userStats.totalAnswered}\n`;
    report += `Точность: ${document.getElementById('stat-accuracy').innerText}\n`;
    report += `Ошибок в банке: ${userStats.errorIds.length}\n\n`;
    report += `СТАТИСТИКА ПО ТЕМАМ:\n`;
    for (let t in userStats.topicStats) {
      let acc = Math.round((userStats.topicStats[t].correct / userStats.topicStats[t].total) * 100);
      report += `- ${t}: ${acc}% точности (${userStats.topicStats[t].correct}/${userStats.topicStats[t].total})\n`;
    }
    navigator.clipboard.writeText(report);
    alert("📊 Данные аналитики скопированы! Отправьте их мне в чат.");
  }

  function resetStats() {
    if (confirm("Сбросить всю статистику?")) {
      userStats = { totalAnswered: 0, correctCount: 0, errorIds: [], topicStats: {} };
      saveStats();
    }
  }

  window.onload = () => { currentList = [...allQuestionsData]; renderQuestion(); };
</script>
</body>
</html>
