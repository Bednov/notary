<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Тренажёр Нотариуса</title>
  <style>
    :root {
      --bg-color: #0b1329;
      --card-bg: #162238;
      --text-color: #f8fafc;
      --accent-color: #2563eb;
      --success-color: #10b981;
      --error-color: #ef4444;
      --border-color: #334155;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100dvh;
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif;
      overflow: hidden;
    }

    /* Подгонка контейнера под реальный экран iPhone без лишних отступов */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: max(4px, env(safe-area-inset-top));
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      padding-left: max(10px, env(safe-area-inset-left));
      padding-right: max(10px, env(safe-area-inset-right));
    }

    /* Верхние кнопки управления (уменьшена высота) */
    .top-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 6px;
    }

    .btn-ctrl {
      background: #1e293b;
      color: #38bdf8;
      border: 1px solid #334155;
      padding: 7px 2px;
      border-radius: 8px;
      font-size: 0.78em;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
    }

    .btn-ctrl:active {
      background: #334155;
      transform: scale(0.97);
    }

    /* Статистика (компактнее) */
    .stats-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 6px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .stat-val {
      font-size: 1.1em;
      font-weight: 800;
    }

    .stat-lbl {
      font-size: 0.68em;
      color: #94a3b8;
      margin-top: 1px;
      font-weight: 600;
    }

    /* Основная область вопроса */
    .content-area {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 6px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .question-title {
      font-size: 0.95em;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn {
      background: var(--accent-color);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9em;
      width: 100%;
      cursor: pointer;
      text-align: center;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .option-btn {
      background: #1e293b;
      border: 1px solid var(--border-color);
      color: #f1f5f9;
      text-align: left;
      font-weight: 500;
      font-size: 0.88em;
      line-height: 1.25;
      padding: 9px 10px;
      transition: background 0.2s, border-color 0.2s;
    }

    /* Подсветка ответа */
    .option-btn.correct-ans {
      background: rgba(16, 185, 129, 0.25) !important;
      border-color: var(--success-color) !important;
      color: #4ade80 !important;
      font-weight: 700;
    }

    .option-btn.wrong-ans {
      background: rgba(239, 68, 68, 0.25) !important;
      border-color: var(--error-color) !important;
      color: #f87171 !important;
    }

    .hint-box {
      margin-top: 8px;
      padding: 8px;
      background-color: #1e293b;
      border-left: 3px solid var(--accent-color);
      border-radius: 6px;
      display: none;
      font-size: 0.82em;
      line-height: 1.3;
    }

    .task-card {
      background: #0f172a;
      border: 2px dashed #2563eb;
      padding: 10px;
      border-radius: 8px;
    }

    .nav-bar {
      display: flex;
      gap: 6px;
    }
  </style>
</head>
<body>

<div class="app-container">
  
  <div class="top-controls">
    <div class="btn-ctrl" onclick="shuffleCurrentBlock()">🔀 Блок (30)</div>
    <div class="btn-ctrl" style="color: #f87171;" onclick="shuffleErrors()">⚠️ Ошибки</div>
    <div class="btn-ctrl" style="color: #a78bfa;" onclick="shuffleAllQuestions()">💥 Вся база</div>
  </div>

  <div class="stats-card">
    <div>
      <div class="stat-val" id="stat-total" style="color: #38bdf8;">0</div>
      <div class="stat-lbl">Отвечено</div>
    </div>
    <div>
      <div class="stat-val" id="stat-accuracy" style="color: #4ade80;">0%</div>
      <div class="stat-lbl">Точность</div>
    </div>
    <div>
      <div class="stat-val" id="stat-errors" style="color: #f87171;">0</div>
      <div class="stat-lbl">Ошибок</div>
    </div>
  </div>

  <div style="font-size: 0.75em; color: #94a3b8; margin-bottom: 4px; display: flex; justify-content: space-between; font-weight: 600;">
    <span id="mode-text">Режим: Вся база</span>
    <span id="counter-text">0 / 0</span>
  </div>

  <div class="content-area" id="content-area"></div>

  <div class="nav-bar">
    <button class="btn" style="background: #334155; padding: 10px;" onclick="prevQuestion()">⬅️ Назад</button>
    <button class="btn" style="padding: 10px;" onclick="nextQuestion()">Вперёд ➡️</button>
  </div>

  <button onclick="resetStats()" style="background: none; border: none; color: #64748b; font-size: 0.7em; width: 100%; margin-top: 3px; padding: 2px;">
    🗑️ Сбросить прогресс
  </button>

</div>

<script>
  const allQuestionsData = [
    { 
      id: 1, 
      type: "test", 
      question: "Каковы требования к юридическому стажу для назначения временно исполняющим обязанности (врио) нотариуса?", 
      options: ["Не менее 3 лет", "Не менее 5 лет", "Не менее 1 года"], 
      correct: 1, 
      legalBasis: { 
        rule: "ст. 20 Основ законодательства РФ о нотариате.", 
        logic: "Врио нотариуса выполняет полный объём его полномочий, поэтому порог по стажу аналогичен.", 
        example: "Юридический стаж должен составлять не менее 5 лет." 
      } 
    },
    { 
      id: 2, 
      type: "test", 
      question: "Какой срок действия результатов квалификационного экзамена при отсутствии назначения на должность?", 
      options: ["1 год", "3 года", "5 лет"], 
      correct: 1, 
      legalBasis: { 
        rule: "ч. 4 ст. 3.1 Основ законодательства РФ о нотариате.", 
        logic: "Законодательство регулярно обновляется, знания требуют подтверждения.", 
        example: "Экзамен действителен в течение 3 лет." 
      } 
    },
    { 
      id: 3, 
      type: "task", 
      title: "Практическая задача №1: Наследование по завещанию", 
      scenario: "К нотариусу обратился гражданин А. с заявлением о принятии наследства по завещанию после смерти отца. Всё имущество завещано А. Однако у умершего осталась нетрудоспособная супруга (65 лет). Каковы действия нотариуса?", 
      solution: { 
        rule: "ст. 1149 ГК РФ (Обязательная доля).", 
        logic: "Нетрудоспособная супруга имеет право на обязательную долю независимо от содержания завещания.", 
        action: "Разъяснить супруге право на обязательную долю и при подаче заявления выдать свидетельство." 
      } 
    }
  ];

  let currentList = [];
  let currentIndex = 0;
  let isAnswered = false;
  let userStats = JSON.parse(localStorage.getItem('notary_stats')) || { totalAnswered: 0, correctCount: 0, errorIds: [] };

  function saveStats() {
    localStorage.setItem('notary_stats', JSON.stringify(userStats));
    updateStatsUI();
  }

  function updateStatsUI() {
    document.getElementById('stat-total').innerText = userStats.totalAnswered;
    document.getElementById('stat-errors').innerText = userStats.errorIds.length;
    let acc = userStats.totalAnswered > 0 ? Math.round((userStats.correctCount / userStats.totalAnswered) * 100) : 0;
    document.getElementById('stat-accuracy').innerText = acc + '%';
  }

  function shuffle(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function shuffleAllQuestions() {
    currentList = shuffle(allQuestionsData);
    currentIndex = 0;
    document.getElementById('mode-text').innerText = "Режим: Вся база";
    renderQuestion();
  }

  function shuffleErrors() {
    let errs = allQuestionsData.filter(q => userStats.errorIds.includes(q.id));
    if (errs.length === 0) {
      alert("У вас пока нет ошибок!");
      return;
    }
    currentList = shuffle(errs);
    currentIndex = 0;
    document.getElementById('mode-text').innerText = "Режим: Работа над ошибками";
    renderQuestion();
  }

  function shuffleCurrentBlock() {
    let start = Math.floor(currentIndex / 30) * 30;
    let end = Math.min(start + 30, currentList.length);
    let block = currentList.slice(start, end);
    currentList.splice(start, block.length, ...shuffle(block));
    currentIndex = start;
    document.getElementById('mode-text').innerText = `Режим: Блок ${start + 1}-${end}`;
    renderQuestion();
  }

  function renderQuestion() {
    isAnswered = false;
    if (!currentList || currentList.length === 0) {
      currentList = [...allQuestionsData];
    }
    
    const q = currentList[currentIndex];
    document.getElementById('counter-text').innerText = `${currentIndex + 1} / ${currentList.length}`;
    
    const area = document.getElementById('content-area');

    if (q.type === "task") {
      area.innerHTML = `
        <div class="task-card">
          <h3 style="margin-top:0; margin-bottom:6px; color:#38bdf8; font-size:0.92em;">📋 ${q.title}</h3>
          <p style="line-height:1.3; color:#cbd5e1; font-size:0.85em; margin-bottom:8px;">${q.scenario}</p>
          <button class="btn" style="padding:8px;" onclick="document.getElementById('task-sol').style.display='block'">⚖️ Показать решение</button>
          <div id="task-sol" style="display:none; margin-top:8px; font-size:0.82em; line-height:1.3;">
            <p style="margin:3px 0;"><b>Норма:</b> ${q.solution.rule}</p>
            <p style="margin:3px 0;"><b>Логика:</b> ${q.solution.logic}</p>
            <p style="margin:3px 0;"><b>Действия:</b> ${q.solution.action}</p>
            <div style="display:flex; gap:6px; margin-top:8px;">
              <button class="btn" style="background:#10b981; padding:8px;" onclick="markTask(true, ${q.id})">Решил верно</button>
              <button class="btn" style="background:#ef4444; padding:8px;" onclick="markTask(false, ${q.id})">В ошибки</button>
            </div>
          </div>
        </div>
      `;
    } else {
      area.innerHTML = `
        <div class="question-title">${q.question}</div>
        <div class="options-grid" id="options-container"></div>
        <button class="btn" style="background:#334155; margin-top:10px; padding:8px;" onclick="toggleHint()">⚖️ Разбор нормы</button>
        <div id="hint-box" class="hint-box">
          <p style="margin:0 0 3px 0;"><b>📜 Норма:</b> ${q.legalBasis.rule}</p>
          <p style="margin:0 0 3px 0;"><b>🧠 Логика:</b> ${q.legalBasis.logic}</p>
          <p style="margin:0;"><b>💡 Пример:</b> ${q.legalBasis.example}</p>
        </div>
      `;

      const container = document.getElementById('options-container');
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'btn option-btn';
        btn.innerText = `${idx + 1}. ${opt}`;
        btn.onclick = (e) => checkAnswer(idx, q.correct, q.id, e.target);
        container.appendChild(btn);
      });
    }

    updateStatsUI();
  }

  function checkAnswer(selected, correct, qId, targetBtn) {
    if (isAnswered) return;
    isAnswered = true;

    userStats.totalAnswered++;
    const allBtns = document.querySelectorAll('.option-btn');

    if (selected === correct) {
      userStats.correctCount++;
      targetBtn.classList.add('correct-ans');
      saveStats();
      
      // Авто-переход через 700 мс без висячих всплывающих окон
      setTimeout(() => {
        nextQuestion();
      }, 700);
    } else {
      if (!userStats.errorIds.includes(qId)) userStats.errorIds.push(qId);
      targetBtn.classList.add('wrong-ans');
      if (allBtns[correct]) allBtns[correct].classList.add('correct-ans');
      
      document.getElementById('hint-box').style.display = 'block';
      saveStats();
    }
  }

  function markTask(success, qId) {
    userStats.totalAnswered++;
    if (success) {
      userStats.correctCount++;
      userStats.errorIds = userStats.errorIds.filter(id => id !== qId);
    } else {
      if (!userStats.errorIds.includes(qId)) userStats.errorIds.push(qId);
    }
    saveStats();
    nextQuestion();
  }

  function toggleHint() {
    const box = document.getElementById('hint-box');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  }

  function nextQuestion() {
    if (currentIndex < currentList.length - 1) { currentIndex++; renderQuestion(); }
  }

  function prevQuestion() {
    if (currentIndex > 0) { currentIndex--; renderQuestion(); }
  }

  function resetStats() {
    if (confirm("Сбросить статистику и ошибки?")) {
      userStats = { totalAnswered: 0, correctCount: 0, errorIds: [] };
      saveStats();
    }
  }

  window.onload = () => {
    currentList = [...allQuestionsData];
    renderQuestion();
  };
</script>
</body>
</html>
