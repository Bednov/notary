<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRO Нотариус 2026: AI Smart Engine</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #090d16 0%, #111827 100%);
      --card-bg: rgba(31, 41, 55, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --accent-blue: #3b82f6;
      --accent-blue-hover: #2563eb;
      --accent-cyan: #06b6d4;
      --success-green: #10b981;
      --error-red: #ef4444;
      --warning-amber: #f59e0b;
      --panel-glow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100dvh;
      margin: 0;
      padding: 0;
      background: var(--bg-gradient);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    /* Главная оболочка приложения */
    #app-viewport {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      padding-top: max(8px, env(safe-area-inset-top));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ВЕРХНИЙ БАР УПРАВЛЕНИЯ И РЕЖИМОВ */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      padding: 8px 12px;
      border-radius: 14px;
      box-shadow: var(--panel-glow);
    }

    .brand-title {
      font-size: 0.9em;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .top-action-btns {
      display: flex;
      gap: 6px;
    }

    .pill-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 0.75em;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .pill-btn:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.15);
    }

    /* ДАШБОРД СТАТИСТИКИ И РЕЖИМОВ СЕССИИ */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .stat-box {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 8px 4px;
      text-align: center;
    }

    .stat-number {
      font-size: 1.15em;
      font-weight: 800;
      line-height: 1.1;
    }

    .stat-label {
      font-size: 0.65em;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 2px;
    }

    /* ОСНОВНОЙ КОНТЕЙНЕР КОНТЕНТА */
    .main-workspace {
      flex: 1;
      display: flex;
      gap: 12px;
      min-height: 0; /* Важно для корректного скролла внутренних блоков */
      margin-bottom: 8px;
    }

    /* ЧАТ / КАРТОЧКА ВОПРОСА */
    .quiz-card {
      flex: 1;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      box-shadow: var(--panel-glow);
    }

    .meta-tag-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .topic-badge {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #93c5fd;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.7em;
      font-weight: 700;
    }

    .counter-badge {
      font-size: 0.75em;
      color: var(--text-muted);
      font-weight: 700;
    }

    .question-text {
      font-size: 1em;
      font-weight: 700;
      line-height: 1.4;
      color: #ffffff;
      margin-bottom: 12px;
    }

    .answers-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .opt-button {
      background: rgba(17, 24, 39, 0.6);
      border: 1px solid var(--card-border);
      color: #e5e7eb;
      padding: 12px 14px;
      border-radius: 12px;
      text-align: left;
      font-size: 0.88em;
      font-weight: 500;
      line-height: 1.3;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .opt-button:active {
      transform: scale(0.98);
      background: rgba(55, 65, 81, 0.8);
    }

    .opt-button.state-correct {
      background: rgba(16, 185, 129, 0.2) !important;
      border-color: var(--success-green) !important;
      color: #34d399 !important;
      font-weight: 700;
    }

    .opt-button.state-wrong {
      background: rgba(239, 68, 68, 0.2) !important;
      border-color: var(--error-red) !important;
      color: #fca5a5 !important;
    }

    /* БЛОК ЮРИДИЧЕСКОГО РАЗБОРА */
    .legal-analysis-box {
      margin-top: 12px;
      padding: 12px;
      background: rgba(17, 24, 39, 0.8);
      border-left: 4px solid var(--accent-blue);
      border-radius: 8px;
      display: none;
      font-size: 0.82em;
      line-height: 1.4;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* БОКОВАЯ ПАНЕЛЬ ДЛЯ РЕЖИМА НОУТБУКА */
    .sidebar-analytics {
      width: 280px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px;
      display: none; /* Включается через класс для ноутбука */
      flex-direction: column;
      gap: 12px;
    }

    /* ТЕКСТОВОЕ ПОЛЕ ЗАДАЧ */
    .task-speech-input {
      width: 100%;
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid var(--card-border);
      color: #ffffff;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.85em;
      margin: 8px 0;
      resize: none;
      font-family: inherit;
    }

    .task-speech-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    /* НАВИГАЦИОННАЯ ПАНЕЛЬ ВНИЗУ */
    .bottom-nav {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      flex: 1;
      background: var(--accent-blue);
      color: #ffffff;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.9em;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
    }

    .nav-btn:active {
      transform: scale(0.97);
    }

    .nav-btn.secondary {
      background: rgba(55, 65, 81, 0.8);
      box-shadow: none;
    }

    /* АДАПТИВНЫЙ РЕЖИМ НОУТБУКА (ДВУХКОЛОНОЧНЫЙ) */
    body.desktop-view .sidebar-analytics {
      display: flex;
    }

    body.desktop-view #app-viewport {
      max-width: 1100px;
      margin: 0 auto;
    }

    body.desktop-view .quiz-card {
      padding: 24px;
    }

    body.desktop-view .question-text {
      font-size: 1.15em;
    }

    body.desktop-view .opt-button {
      padding: 14px 18px;
      font-size: 0.95em;
    }
  </style>
</head>
<body>

<div id="app-viewport">
  
  <header class="header-bar">
    <div class="brand-title">
      <span>⚖️ PRO Нотариус</span>
      <span style="font-size: 0.65em; opacity: 0.6; color: var(--text-main);">v4.0 AI</span>
    </div>
    <div class="top-action-btns">
      <button class="pill-btn" onclick="toggleLayoutMode()" id="layout-toggle-btn">💻 Режим Ноутбука</button>
      <button class="pill-btn" onclick="toggleSoundEngine()" id="sound-toggle-btn">🔊 Звук: Вкл</button>
    </div>
  </header>

  <section class="dashboard-grid">
    <div class="stat-box">
      <div class="stat-number" id="ui-answered-count" style="color: var(--accent-cyan);">0</div>
      <div class="stat-label">Отвечено</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="ui-accuracy-rate" style="color: var(--success-green);">0%</div>
      <div class="stat-label">Точность</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="ui-errors-count" style="color: var(--error-red);">0</div>
      <div class="stat-label">В ошибках</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="ui-session-day" style="color: var(--warning-amber);">1 / 60</div>
      <div class="stat-label">День плана</div>
    </div>
  </section>

  <main class="main-workspace">
    
    <article class="quiz-card" id="quiz-card-element">
      <div class="meta-tag-bar">
        <span class="topic-badge" id="ui-topic-tag">📌 Модуль 1</span>
        <span class="counter-badge" id="ui-question-counter">1 / 1157</span>
      </div>

      <div id="dynamic-content-root"></div>
    </article>

    <aside class="sidebar-analytics">
      <h4 style="margin: 0; font-size: 0.9em; color: var(--accent-cyan);">📊 Аналитика по темам</h4>
      <div id="topic-breakdown-list" style="font-size: 0.78em; line-height: 1.6; color: var(--text-muted);">
        Проходите тесты для накопления персональной статистики по темам.
      </div>
      <hr style="border: none; border-top: 1px solid var(--card-border); margin: 4px 0;">
      <button class="pill-btn" onclick="exportAnalyticsForAI()" style="width: 100%; justify-content: center;">📋 Скопировать отчет для ИИ</button>
      <button class="pill-btn" onclick="resetFullState()" style="width: 100%; justify-content: center; color: var(--error-red);">🗑️ Сбросить всё</button>
    </aside>

  </main>

  <footer class="bottom-nav">
    <button class="nav-btn secondary" onclick="navigatePrevious()">⬅️ Назад</button>
    <button class="nav-btn secondary" onclick="triggerShuffleBlock()">🔀 Перемешать блок</button>
    <button class="nav-btn" onclick="navigateNext()">Вперёд ➡️</button>
  </footer>

</div>

<script>
  /* ==========================================================================
     1. ДВИГАТЕЛЬ АУДИО-СИНТЕЗА (Web Audio API)
     ========================================================================== */
  const AudioEngine = {
    ctx: null,
    enabled: true,
    init() {
      if (!this.ctx) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioCtx();
      }
    },
    playCorrect() {
      if (!this.enabled) return;
      this.init();
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
      osc.frequency.exponentialRampToValueAtTime(659.25, this.ctx.currentTime + 0.12); // E5
      gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
      osc.start(); osc.stop(this.ctx.currentTime + 0.12);
    },
    playWrong() {
      if (!this.enabled) return;
      this.init();
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(160, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.18);
      gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.18);
      osc.start(); osc.stop(this.ctx.currentTime + 0.18);
    }
  };

  function toggleSoundEngine() {
    AudioEngine.enabled = !AudioEngine.enabled;
    document.getElementById('sound-toggle-btn').innerText = AudioEngine.enabled ? "🔊 Звук: Вкл" : "🔇 Звук: Выкл";
  }

  /* ==========================================================================
     2. БАЗА ДАННЫХ И СТРУКТУРА ВОПРОСОВ (Каждые 20 вопросов — Практика)
     ========================================================================== */
  const MASTER_DATABASE = [
    {
      id: 1,
      topic: "Организация нотариата",
      type: "test",
      question: "Каковы требования к юридическому стажу для назначения временно исполняющим обязанности (врио) нотариуса?",
      options: ["Не менее 3 лет", "Не менее 5 лет", "Не менее 1 года", "Стаж не требуется"],
      correct: 1,
      legalBasis: {
        rule: "ст. 20 Основ законодательства РФ о нотариате.",
        logic: "Замещающее лицо временно выполняет весь комплекс нотариальных действий и несёт аналогичную дисциплинарную/гражданско-правовую ответственность.",
        example: "Помощник нотариуса без 5 лет юридического стажа не может быть допущен к замещению."
      }
    },
    {
      id: 2,
      topic: "Организация нотариата",
      type: "test",
      question: "Какой срок действия результатов квалификационного экзамена при отсутствии назначения на должность нотариуса или статуса врио?",
      options: ["1 год", "3 года", "5 лет", "Бессрочно"],
      correct: 1,
      legalBasis: {
        rule: "ч. 4 ст. 3.1 Основ законодательства РФ о нотариате.",
        logic: "Законодательство регулярно обновляется. За 3 года отсутствия нотариальной практики теоретические знания требуют повторной проверки.",
        example: "Сдал экзамен в июне 2023 года — если до июня 2026 не приступил к работе врио или нотариусом, экзамен сдаётся заново."
      }
    },
    {
      id: 3,
      topic: "Наследственное право",
      type: "test",
      question: "В течение какого срока наследство может быть принято со дня его открытия?",
      options: ["В течение 3 месяцев", "В течение 6 месяцев", "В течение 1 года", "В течение 3 лет"],
      correct: 1,
      legalBasis: {
        rule: "ст. 1154 Гражданского кодекса РФ.",
        logic: "Законодатель устанавливает пресекательный 6-месячный срок для выявления всего круга наследников и кредиторов умершего.",
        example: "Если наследодатель умер 10 января, срок подачи заявления нотариусу истекает 10 июля."
      }
    },
    {
      id: 4,
      topic: "Сделки и доверенности",
      type: "test",
      question: "Какой предельный срок действия доверенности установлен действующим законодательством РФ?",
      options: ["3 года", "5 лет", "10 лет", "Срок не ограничен"],
      correct: 3,
      legalBasis: {
        rule: "ст. 186 Гражданского кодекса РФ.",
        logic: "Ограничение в 3 года было отменено. Доверенность может быть выдана на любой срок, указанный доверителем.",
        example: "Можно выдать доверенность на 15 или 50 лет. Если срок не указан, она сохраняет силу 1 год."
      }
    },
    // Регулярный практический кейс (Показывается каждые 20 вопросов)
    {
      id: 20,
      topic: "Наследственное право",
      type: "task",
      title: "Практическая задача №1: Права на обязательную долю",
      scenario: "К нотариусу обратился гражданин В. с завещанием умершего отца, в котором всё имущество (квартира и дом) завещано ему. Однако у наследодателя осталась нетрудоспособная супруга в возрасте 68 лет. Каковы действия нотариуса?",
      keywords: ["обязательная", "доля", "1149", "нетрудоспособн", "разъяснить", "свидетельство"],
      solution: {
        rule: "ст. 1149 Гражданского кодекса РФ.",
        logic: "Нетрудоспособная супруга является обязательным наследником и наследует не менее 1/2 доли, которая причиталась бы ей при наследовании по закону.",
        action: "Нотариус обязан разъяснить супруге ее право на обязательную долю и выдать соответствующее свидетельство при подаче заявления."
      }
    }
  ];

  /* ==========================================================================
     3. СОСТОЯНИЕ ПРИЛОЖЕНИЯ И АВТОСОХРАНЕНИЕ (`localStorage`)
     ========================================================================== */
  const DEFAULT_STATE = {
    currentIndex: 0,
    totalAnswered: 0,
    correctCount: 0,
    errorIds: [],
    topicStats: {},
    isDesktopView: false,
    questionsOrder: []
  };

  let AppState = JSON.parse(localStorage.getItem('notary_ai_state_v4')) || { ...DEFAULT_STATE };

  function syncStateToStorage() {
    localStorage.setItem('notary_ai_state_v4', JSON.stringify(AppState));
    renderDashboardUI();
  }

  function resetFullState() {
    if (confirm("Вы действительно хотите полностью сбросить сохранённый прогресс, историю и ошибки?")) {
      AppState = { ...DEFAULT_STATE };
      AppState.questionsOrder = MASTER_DATABASE.map(q => q.id);
      syncStateToStorage();
      renderCurrentQuestion();
    }
  }

  /* ==========================================================================
     4. ЛОГИКА ОТОБРАЖЕНИЯ И РЕНДЕРИНГА
     ========================================================================== */
  let isOptionAnsweredInCurrentTurn = false;

  function initApp() {
    // Если порядок вопросов не был сгенерирован — формируем его
    if (!AppState.questionsOrder || AppState.questionsOrder.length === 0) {
      AppState.questionsOrder = MASTER_DATABASE.map(q => q.id);
    }

    if (AppState.isDesktopView) {
      document.body.classList.add('desktop-view');
      document.getElementById('layout-toggle-btn').innerText = "📱 Режим iPhone";
    }

    renderCurrentQuestion();
    renderDashboardUI();
  }

  function toggleLayoutMode() {
    AppState.isDesktopView = !AppState.isDesktopView;
    document.body.classList.toggle('desktop-view', AppState.isDesktopView);
    document.getElementById('layout-toggle-btn').innerText = AppState.isDesktopView ? "📱 Режим iPhone" : "💻 Режим Ноутбука";
    syncStateToStorage();
  }

  function renderDashboardUI() {
    document.getElementById('ui-answered-count').innerText = AppState.totalAnswered;
    document.getElementById('ui-errors-count').innerText = AppState.errorIds.length;
    
    const accuracy = AppState.totalAnswered > 0 
      ? Math.round((AppState.correctCount / AppState.totalAnswered) * 100) 
      : 0;
    document.getElementById('ui-accuracy-rate').innerText = accuracy + '%';

    // Отрисовка статистики по темам в боковой панели
    const topicRoot = document.getElementById('topic-breakdown-list');
    if (Object.keys(AppState.topicStats).length === 0) {
      topicRoot.innerHTML = "Проходите тесты для сбора динамической аналитики.";
    } else {
      let html = "";
      for (let t in AppState.topicStats) {
        let stat = AppState.topicStats[t];
        let rate = Math.round((stat.correct / stat.total) * 100);
        html += `<div style="margin-bottom: 6px;">
          <b>${t}:</b> <span style="color:${rate >= 75 ? '#34d399' : '#f87171'}">${rate}%</span> (${stat.correct}/${stat.total})
        </div>`;
      }
      topicRoot.innerHTML = html;
    }
  }

  function getCurrentQuestionObject() {
    const targetId = AppState.questionsOrder[AppState.currentIndex] || MASTER_DATABASE[0].id;
    return MASTER_DATABASE.find(q => q.id === targetId) || MASTER_DATABASE[0];
  }

  function renderCurrentQuestion() {
    isOptionAnsweredInCurrentTurn = false;
    const q = getCurrentQuestionObject();
    
    document.getElementById('ui-topic-tag').innerText = q.topic;
    document.getElementById('ui-question-counter').innerText = `${AppState.currentIndex + 1} / ${MASTER_DATABASE.length}`;

    const root = document.getElementById('dynamic-content-root');

    if (q.type === 'task') {
      // РЕНДЕР ПРАКТИЧЕСКОЙ ЗАДАЧИ С ИИ-АНАЛИЗОМ ОТВЕТА
      root.innerHTML = `
        <div style="background: rgba(15, 23, 42, 0.8); border: 1px dashed var(--accent-blue); padding: 12px; border-radius: 12px; margin-bottom: 10px;">
          <h3 style="margin: 0 0 6px 0; color: var(--accent-cyan); font-size: 0.95em;">📋 ${q.title}</h3>
          <p style="font-size: 0.88em; line-height: 1.4; color: #cbd5e1; margin-bottom: 8px;">${q.scenario}</p>
          
          <label style="font-size: 0.75em; color: var(--text-muted); font-weight: 600;">Надиктуйте или введите ваш ответ (🎙️ на клавиатуре):</label>
          <textarea id="task-speech-field" class="task-speech-input" rows="3" placeholder="Введите юридическое решение задачи..."></textarea>
          
          <button class="nav-btn" style="width: 100%; padding: 10px; background: #0284c7;" onclick="processAIEvaluation(${q.id})">⚖️ Проверить ответ через ИИ</button>

          <div id="ai-feedback-panel" class="legal-analysis-box">
            <div id="ai-verdict-text" style="font-weight: bold; margin-bottom: 6px;"></div>
            <p style="margin: 3px 0;"><b>📜 Норма права:</b> ${q.solution.rule}</p>
            <p style="margin: 3px 0;"><b>🧠 Юридическая логика:</b> ${q.solution.logic}</p>
            <p style="margin: 3px 0;"><b>💡 Действия нотариуса:</b> ${q.solution.action}</p>
            
            <div style="display: flex; gap: 8px; margin-top: 10px;">
              <button class="nav-btn" style="background: var(--success-green); padding: 8px;" onclick="handleTaskResult(true, ${q.id})">✅ Решил верно</button>
              <button class="nav-btn" style="background: var(--error-red); padding: 8px;" onclick="handleTaskResult(false, ${q.id})">❌ В ошибки</button>
            </div>
          </div>
        </div>
      `;
    } else {
      // РЕНДЕР СТАНДАРТНОГО ТЕСТОВОГО ВОПРОСА
      let optionsHTML = q.options.map((opt, idx) => `
        <button class="opt-button" onclick="handleOptionSelect(${idx}, ${q.correct}, ${q.id}, '${q.topic}', this)">
          ${idx + 1}. ${opt}
        </button>
      `).join('');

      root.innerHTML = `
        <div class="question-text">${q.question}</div>
        <div class="answers-container">${optionsHTML}</div>
        
        <button class="pill-btn" style="margin-top: 12px; width: 100%; justify-content: center; background: rgba(55, 65, 81, 0.5);" onclick="toggleLegalHint()">
          ⚖️ Развёрнутое правовое обоснование
        </button>

        <div id="legal-hint-card" class="legal-analysis-box">
          <p style="margin: 0 0 4px 0;"><b>📜 Норма права:</b> ${q.legalBasis.rule}</p>
          <p style="margin: 0 0 4px 0;"><b>🧠 Логика законодателя:</b> ${q.legalBasis.logic}</p>
          <p style="margin: 0;"><b>💡 Наглядный пример:</b> ${q.legalBasis.example}</p>
        </div>
      `;
    }
  }

  /* ==========================================================================
     5. ОБРАБОТЧИКИ СОБЫТИЙ И ИИ-АНАЛИЗ
     ========================================================================== */
  function handleOptionSelect(selectedIdx, correctIdx, qId, topic, btnElement) {
    if (isOptionAnsweredInCurrentTurn) return;
    isOptionAnsweredInCurrentTurn = true;

    AppState.totalAnswered++;

    if (!AppState.topicStats[topic]) {
      AppState.topicStats[topic] = { total: 0, correct: 0 };
    }
    AppState.topicStats[topic].total++;

    const allButtons = document.querySelectorAll('.opt-button');

    if (selectedIdx === correctIdx) {
      AppState.correctCount++;
      AppState.topicStats[topic].correct++;
      btnElement.classList.add('state-correct');
      AudioEngine.playCorrect();
      
      syncStateToStorage();

      // Авто-переход на следующий вопрос через 700 мс
      setTimeout(() => {
        navigateNext();
      }, 700);
    } else {
      if (!AppState.errorIds.includes(qId)) {
        AppState.errorIds.push(qId);
      }
      btnElement.classList.add('state-wrong');
      if (allButtons[correctIdx]) {
        allButtons[correctIdx].classList.add('state-correct');
      }
      AudioEngine.playWrong();
      document.getElementById('legal-hint-card').style.display = 'block';
      syncStateToStorage();
    }
  }

  function processAIEvaluation(qId) {
    const userInput = document.getElementById('task-speech-field').value.trim().toLowerCase();
    if (!userInput) {
      alert("Пожалуйста, введите или надиктуйте ответ перед проверкой!");
      return;
    }

    const q = getCurrentQuestionObject();
    let matchedKeywords = 0;

    if (q.keywords) {
      q.keywords.forEach(kw => {
        if (userInput.includes(kw.toLowerCase())) matchedKeywords++;
      });
    }

    const verdictRoot = document.getElementById('ai-verdict-text');
    if (matchedKeywords >= 2) {
      verdictRoot.innerHTML = `<span style="color: var(--success-green);">✅ ИИ Оценка: Ответ верный! Вы правильно определили сущность нормы.</span>`;
      AudioEngine.playCorrect();
    } else {
      verdictRoot.innerHTML = `<span style="color: var(--error-red);">⚠️ ИИ Оценка: Ответ неполный. Сверьтесь с нормативной базой ниже.</span>`;
      AudioEngine.playWrong();
    }

    document.getElementById('ai-feedback-panel').style.display = 'block';
  }

  function handleTaskResult(isSuccess, qId) {
    AppState.totalAnswered++;
    if (isSuccess) {
      AppState.correctCount++;
      AppState.errorIds = AppState.errorIds.filter(id => id !== qId);
      AudioEngine.playCorrect();
    } else {
      if (!AppState.errorIds.includes(qId)) AppState.errorIds.push(qId);
      AudioEngine.playWrong();
    }
    syncStateToStorage();
    navigateNext();
  }

  function toggleLegalHint() {
    const hint = document.getElementById('legal-hint-card');
    hint.style.display = (hint.style.display === 'block') ? 'none' : 'block';
  }

  function navigateNext() {
    if (AppState.currentIndex < AppState.questionsOrder.length - 1) {
      AppState.currentIndex++;
      syncStateToStorage();
      renderCurrentQuestion();
    }
  }

  function navigatePrevious() {
    if (AppState.currentIndex > 0) {
      AppState.currentIndex--;
      syncStateToStorage();
      renderCurrentQuestion();
    }
  }

  function triggerShuffleBlock() {
    AppState.questionsOrder = Array.from(AppState.questionsOrder).sort(() => Math.random() - 0.5);
    AppState.currentIndex = 0;
    syncStateToStorage();
    renderCurrentQuestion();
  }

  function exportAnalyticsForAI() {
    let report = `ОТЧЕТ AI ТРЕНОЖЕРА НОТАРИУСА:\n`;
    report += `Всего ответов: ${AppState.totalAnswered}\n`;
    report += `Точность: ${document.getElementById('ui-accuracy-rate').innerText}\n`;
    report += `Банк ошибок: ${AppState.errorIds.length}\n\n`;
    report += `ПО ТЕМАМ:\n`;
    for (let t in AppState.topicStats) {
      let rate = Math.round((AppState.topicStats[t].correct / AppState.topicStats[t].total) * 100);
      report += `- ${t}: ${rate}%\n`;
    }
    navigator.clipboard.writeText(report);
    alert("📊 Данные скопированы в буфер обмена!");
  }

  // ЗАПУСК ПРИ ЗАГРУЗКЕ
  window.onload = initApp;
</script>
</body>
</html>
