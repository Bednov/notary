<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Нотариус Pro</title>
  
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

  <style>
    :root {
      --bg-color: #0b1329;
      --card-bg: #162238;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #2563eb;
      --accent-cyan: #38bdf8;
      --success-green: #10b981;
      --error-red: #ef4444;
      --warning-amber: #f59e0b;
      --border-color: #334155;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100dvh; margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif;
      overflow: hidden;
    }

    #app-container {
      display: flex; flex-direction: column; width: 100%; height: 100dvh;
      padding-top: max(8px, env(safe-area-inset-top));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      padding-left: max(10px, env(safe-area-inset-left));
      padding-right: max(10px, env(safe-area-inset-right));
    }

    .header-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 4px; background: var(--card-bg); border: 1px solid var(--border-color);
      padding: 6px 10px; border-radius: 12px; flex-shrink: 0; gap: 4px;
    }

    .brand-title {
      font-size: 0.85em; font-weight: 800; color: var(--accent-cyan);
      cursor: pointer; padding: 6px 10px; border-radius: 8px;
      background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3);
    }

    .pill-btn {
      background: #1e293b; border: 1px solid var(--border-color); color: var(--text-main);
      padding: 6px 10px; border-radius: 16px; font-size: 0.72em; font-weight: 600; cursor: pointer;
    }
    .pill-btn.exam-btn { background: var(--accent-blue); color: #fff; border-color: var(--accent-cyan); font-weight: 700; }

    #exam-timer-display {
      background: var(--error-red); color: white; padding: 5px 10px; border-radius: 8px;
      font-weight: 800; font-size: 0.85em; display: none; text-align: center;
    }

    .global-progress-wrapper {
      background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 10px; padding: 6px 10px; margin-bottom: 6px; flex-shrink: 0;
    }
    .progress-info-row { display: flex; justify-content: space-between; font-size: 0.7em; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; }
    .progress-bar-bg { width: 100%; height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; border: 1px solid var(--border-color); }
    .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); border-radius: 4px; transition: width 0.4s ease; }

    .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 6px; flex-shrink: 0; }
    .stat-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 6px 2px; text-align: center; cursor: pointer; }
    .stat-number { font-size: 1.1em; font-weight: 800; }
    .stat-label { font-size: 0.65em; color: var(--text-muted); font-weight: 600; margin-top: 2px; }

    .quiz-card {
      flex: 1; background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 12px; margin-bottom: 6px;
      display: flex; flex-direction: column; overflow-y: auto; min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    .meta-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-shrink: 0; }
    .topic-badge { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); color: #93c5fd; padding: 3px 8px; border-radius: 6px; font-size: 0.7em; font-weight: 700; }
    .counter-badge { font-size: 0.75em; color: var(--text-muted); font-weight: 700; }

    .question-text { font-size: 0.95em; font-weight: 700; line-height: 1.35; color: #ffffff; margin-bottom: 12px; white-space: pre-line; }
    .answers-container { display: flex; flex-direction: column; gap: 6px; }

    .opt-button {
      background: #1e293b; border: 1px solid var(--border-color); color: #f1f5f9;
      padding: 10px 12px; border-radius: 10px; text-align: left; font-size: 0.88em;
      font-weight: 500; line-height: 1.3; cursor: pointer;
    }
    .opt-button.correct { background: rgba(16, 185, 129, 0.25) !important; border-color: var(--success-green) !important; color: #34d399 !important; font-weight: 700; }
    .opt-button.wrong { background: rgba(239, 68, 68, 0.25) !important; border-color: var(--error-red) !important; color: #fca5a5 !important; }

    .legal-analysis-box { margin-top: 10px; padding: 10px; background: #0f172a; border-left: 3px solid var(--accent-blue); border-radius: 8px; display: none; font-size: 0.82em; line-height: 1.35; }
    .task-score-panel { background: rgba(245, 158, 11, 0.12); border: 1px dashed var(--warning-amber); border-radius: 12px; padding: 10px; margin-top: 12px; font-size: 0.85em; text-align: center; }

    .bottom-nav { display: flex; gap: 6px; flex-shrink: 0; }
    .nav-btn { flex: 1; background: var(--accent-blue); color: #ffffff; border: none; padding: 12px 6px; border-radius: 10px; font-weight: 700; font-size: 0.85em; cursor: pointer; text-align: center; }
    .nav-btn.secondary { background: #334155; }
    .nav-btn.home-btn { background: #0284c7; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 19, 41, 0.96); backdrop-filter: blur(10px); z-index: 100; display: none; flex-direction: column; padding: 16px; overflow-y: auto; }
    .topic-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .block-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; margin-top: 8px; }
    .block-btn { background: #1e293b; border: 1px solid var(--border-color); color: var(--accent-cyan); padding: 8px; border-radius: 8px; text-align: center; font-size: 0.8em; font-weight: 700; cursor: pointer; }

    .result-screen { text-align: center; padding: 20px 10px; }
    .verdict-badge { display: inline-block; padding: 12px 34px; border-radius: 20px; font-size: 1.6em; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }
    .verdict-badge.passed { background: var(--success-green); color: white; box-shadow: 0 0 15px rgba(16,185,129,0.4); }
    .verdict-badge.failed { background: var(--error-red); color: white; box-shadow: 0 0 15px rgba(239,68,68,0.4); }
  </style>
</head>
<body>

<div id="app-container">
  <header class="header-bar">
    <div class="brand-title" onclick="openRandomTask()">⚖️ Нотариус Pro 🔀</div>
    <div id="exam-timer-display">60:00</div>
    <div style="display: flex; gap: 4px;">
      <button class="pill-btn exam-btn" onclick="startOfficialExamMode()">⏱️ Билет (50+1)</button>
      <button class="pill-btn" onclick="openTopicsModal()">📚 Темы</button>
      <button class="pill-btn" onclick="resetFullState()" style="color: var(--error-red);">🗑️ Сброс</button>
    </div>
  </header>

  <section class="global-progress-wrapper">
    <div class="progress-info-row">
      <span>🚀 Общий прогресс базы:</span>
      <span id="ui-global-progress-text" style="color: var(--accent-cyan);">0 / 0</span>
    </div>
    <div class="progress-bar-bg"><div id="ui-global-progress-bar" class="progress-bar-fill"></div></div>
  </section>

  <section class="dashboard-grid">
    <div class="stat-box"><div class="stat-number" id="ui-answered-count" style="color: var(--accent-cyan);">0</div><div class="stat-label">Отвечено</div></div>
    <div class="stat-box"><div class="stat-number" id="ui-accuracy-rate" style="color: var(--success-green);">0%</div><div class="stat-label">Точность</div></div>
    <div class="stat-box" onclick="startErrorReviewSession()" style="border-color: var(--error-red);"><div class="stat-number" id="ui-errors-count" style="color: var(--error-red);">0</div><div class="stat-label">❌ Ошибки</div></div>
    <div class="stat-box"><div class="stat-number" id="ui-progress-pos" style="color: var(--warning-amber);">1 / 0</div><div class="stat-label">Позиция</div></div>
  </section>

  <article class="quiz-card" id="quiz-card-element">
    <div class="meta-bar">
      <span class="topic-badge" id="ui-topic-tag">📌 Инициализация</span>
      <span class="counter-badge" id="ui-question-counter">0 / 0</span>
    </div>
    <div id="dynamic-content-root">
      <div style="text-align: center; padding: 25px; color: var(--accent-cyan);">⏳ Синхронизация файлов на Айфоне...</div>
    </div>
  </article>

  <footer class="bottom-nav">
    <button class="nav-btn secondary" onclick="navigatePrevious()">⬅️ Назад</button>
    <button class="nav-btn home-btn" onclick="restoreMainTestSession()">🏠 Все темы</button>
    <button class="nav-btn secondary" onclick="triggerShuffleBlock()">🔀 Блок</button>
    <button class="nav-btn" onclick="navigateNext()">Вперёд ➡️</button>
  </footer>
</div>

<div class="modal-overlay" id="topics-modal">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; position: sticky; top: 0; background: var(--bg-color); padding: 8px 0; z-index: 10;">
    <h2 style="margin: 0; font-size: 1.1em; color: var(--accent-cyan);">📚 Каталог разделов</h2>
    <button class="pill-btn" onclick="closeTopicsModal()" style="background: var(--accent-blue); padding: 8px 14px;">К тесту</button>
  </div>
  <div id="topics-list-container"></div>
</div>

<script>
  let isTransitioning = false; 

  function generateLegalBasis(qText) {
    const text = qText.toLowerCase();
    if (text.includes("наследств") || text.includes("завещ") || text.includes("открыт")) {
      return { rule: "Гражданский кодекс РФ (Раздел V. Наследственное право)", logic: "Регулирует порядок наследования, пресекательные сроки принятия и права обязательных наследников." };
    }
    if (text.includes("доверенност") || text.includes("представитель") || text.includes("полномоч")) {
      return { rule: "Гл. 10 Гражданского кодекса РФ", logic: "Устанавливает требования к нотариальной форме доверенностей и правила их отмены в ЕИС." };
    }
    if (text.includes("супруг") || text.includes("брачн") || text.includes("брак")) {
      return { rule: "Семейный кодекс РФ (гл. 7-8 СК РФ)", logic: "Определяет законный и договорный режим имущества супругов, правила раздела совместной собственности." };
    }
    return { rule: "Основы законодательства РФ о нотариате", logic: "Регламентирует правила совершения нотариальных действий и проверку законности сделок." };
  }

  let RAW_EXCEL_TESTS = [];
  let TASKS_DATABASE = [];
  const DEFAULT_STATE = { currentIndex: 0, totalAnswered: 0, correctCount: 0, errorIds: [], sessionQueue: [], savedMainSession: null };
  
  let AppState = JSON.parse(localStorage.getItem('notary_pwa_v6')) || { ...DEFAULT_STATE };
  let GlobalMasteredIds = JSON.parse(localStorage.getItem('notary_global_mastered_v3')) || [];
  let RecentRandomShownIds = [];

  let isExamMode = false;
  let examCountdown = null;
  let examTimeLeft = 3600; 
  let examScore = { testPoints: 0, taskPoint: 0, argPoints: 0 };

  function syncStateToStorage() {
    localStorage.setItem('notary_pwa_v6', JSON.stringify(AppState));
    localStorage.setItem('notary_global_mastered_v3', JSON.stringify(GlobalMasteredIds));
    renderDashboardUI();
  }

  function resetFullState() {
    if (confirm("Сбросить статистику круга? Общий вечный прогресс не пострадает!")) {
      clearInterval(examCountdown);
      isExamMode = false;
      document.getElementById('exam-timer-display').style.display = "none";
      AppState = { ...DEFAULT_STATE };
      buildSessionQueue();
      syncStateToStorage();
      renderCurrentQuestion();
    }
  }

  function startOfficialExamMode() {
    if (RAW_EXCEL_TESTS.length === 0) { alert("База данных тестов еще подгружается!"); return; }
    
    isExamMode = true;
    examTimeLeft = 3600; 
    examScore = { testPoints: 0, taskPoint: 0, argPoints: 0 };

    document.getElementById('exam-timer-display').style.display = "block";
    clearInterval(examCountdown);
    examCountdown = setInterval(() => {
      examTimeLeft--;
      if (examTimeLeft <= 0) {
        clearInterval(examCountdown);
        finishOfficialExam();
      } else {
        let mins = Math.floor(examTimeLeft / 60);
        let secs = examTimeLeft % 60;
        document.getElementById('exam-timer-display').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      }
    }, 1000);

    let shuffledTests = [...RAW_EXCEL_TESTS].sort(() => Math.random() - 0.5).slice(0, 50);
    let shuffledTasks = [...TASKS_DATABASE].sort(() => Math.random() - 0.5);
    let chosenTask = shuffledTasks.length > 0 ? shuffledTasks[0] : null;

    let examQueue = shuffledTests.map((q, idx) => ({ ...q, isTaskItem: false, topic: `⏱️ Экзамен: Тест ${idx + 1} из 50` }));
    if (chosenTask) {
      examQueue.push({ ...chosenTask, isTaskItem: true, topic: `⏱️ Экзамен: Практическая задача (№51)` });
    }

    AppState.sessionQueue = examQueue;
    AppState.currentIndex = 0;
    syncStateToStorage();
    renderCurrentQuestion();
    alert("🚀 Режим официального экзамена активирован! Время пошло.");
  }

  function finishOfficialExam() {
    clearInterval(examCountdown);
    document.getElementById('exam-timer-display').style.display = "none";
    
    let totalPoints = examScore.testPoints + examScore.taskPoint + examScore.argPoints;
    let isPassed = totalPoints >= 45; 

    const root = document.getElementById('dynamic-content-root');
    document.getElementById('ui-topic-tag').innerText = "🏁 Результаты билета";
    
    root.innerHTML = `
      <div class="result-screen">
        <div class="verdict-badge ${isPassed ? 'passed' : 'failed'}
