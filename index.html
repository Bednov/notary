<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PRO Нотариус 2026: Smart Trainer</title>
  <!-- Подключаем библиотеку для чтения Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg-color: #0b1329;
      --card-bg: #162238;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #2563eb;
      --accent-cyan: #38bdf8;
      --success-green: #10b981;
      --error-red: #ef4444;
      --warning-amber: #f59e0b;
      --border-color: #334155;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100dvh; margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    #app-container {
      display: flex; flex-direction: column; width: 100%; height: 100dvh;
      padding-top: max(8px, env(safe-area-inset-top));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      padding-left: max(10px, env(safe-area-inset-left));
      padding-right: max(10px, env(safe-area-inset-right));
    }

    .header-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; background: var(--card-bg); border: 1px solid var(--border-color);
      padding: 8px 10px; border-radius: 12px; flex-shrink: 0;
    }

    .brand-title { font-size: 0.88em; font-weight: 800; color: var(--accent-cyan); }

    .pill-btn {
      background: #1e293b; border: 1px solid var(--border-color); color: var(--text-main);
      padding: 6px 10px; border-radius: 16px; font-size: 0.72em; font-weight: 600; cursor: pointer;
    }

    .dashboard-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
      margin-bottom: 6px; flex-shrink: 0;
    }

    .stat-box {
      background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 10px; padding: 6px 2px; text-align: center;
    }
    .stat-number { font-size: 1.1em; font-weight: 800; }
    .stat-label { font-size: 0.65em; color: var(--text-muted); font-weight: 600; margin-top: 2px; }

    .quiz-card {
      flex: 1; background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 12px; margin-bottom: 6px;
      display: flex; flex-direction: column; overflow-y: auto; min-height: 0;
    }

    .meta-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; flex-shrink: 0;
    }

    .topic-badge {
      background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4);
      color: #93c5fd; padding: 3px 8px; border-radius: 6px; font-size: 0.7em; font-weight: 700;
    }
    .counter-badge { font-size: 0.75em; color: var(--text-muted); font-weight: 700; }

    .question-text { font-size: 0.95em; font-weight: 700; line-height: 1.35; color: #ffffff; margin-bottom: 10px; }
    .answers-container { display: flex; flex-direction: column; gap: 6px; }

    .opt-button {
      background: #1e293b; border: 1px solid var(--border-color); color: #f1f5f9;
      padding: 10px 12px; border-radius: 10px; text-align: left; font-size: 0.88em;
      font-weight: 500; line-height: 1.3; cursor: pointer;
    }
    .opt-button.correct { background: rgba(16, 185, 129, 0.25) !important; border-color: var(--success-green) !important; color: #34d399 !important; font-weight: 700; }
    .opt-button.wrong { background: rgba(239, 68, 68, 0.25) !important; border-color: var(--error-red) !important; color: #fca5a5 !important; }

    .legal-analysis-box {
      margin-top: 10px; padding: 10px; background: #0f172a;
      border-left: 3px solid var(--accent-blue); border-radius: 8px; display: none;
      font-size: 0.82em; line-height: 1.35;
    }

    .bottom-nav { display: flex; gap: 8px; flex-shrink: 0; }
    .nav-btn {
      flex: 1; background: var(--accent-blue); color: #ffffff; border: none;
      padding: 12px; border-radius: 10px; font-weight: 700; font-size: 0.9em; cursor: pointer; text-align: center;
    }
    .nav-btn.secondary { background: #334155; }
  </style>
</head>
<body>

<div id="app-container">
  <header class="header-bar">
    <div class="brand-title">⚖️ PRO Нотариус 2026</div>
    <div style="display: flex; gap: 4px;">
      <button class="pill-btn" onclick="resetFullState()" style="color: var(--error-red);">🗑️ Сброс</button>
    </div>
  </header>

  <section class="dashboard-grid">
    <div class="stat-box"><div class="stat-number" id="ui-answered-count" style="color: var(--accent-cyan);">0</div><div class="stat-label">Отвечено</div></div>
    <div class="stat-box"><div class="stat-number" id="ui-accuracy-rate" style="color: var(--success-green);">0%</div><div class="stat-label">Точность</div></div>
    <div class="stat-box"><div class="stat-number" id="ui-errors-count" style="color: var(--error-red);">0</div><div class="stat-label">В ошибках</div></div>
    <div class="stat-box"><div class="stat-number" id="ui-total-questions" style="color: var(--warning-amber);">0</div><div class="stat-label">Всего</div></div>
  </section>

  <article class="quiz-card" id="quiz-card-element">
    <div class="meta-bar">
      <span class="topic-badge" id="ui-topic-tag">📌 Загрузка...</span>
      <span class="counter-badge" id="ui-question-counter">0 / 0</span>
    </div>
    <div id="dynamic-content-root">
      <div style="text-align: center; padding: 20px; color: var(--accent-cyan);">⏳ Загрузка вопросов из файла Excel...</div>
    </div>
  </article>

  <footer class="bottom-nav">
    <button class="nav-btn secondary" onclick="navigatePrevious()">⬅️ Назад</button>
    <button class="nav-btn" onclick="navigateNext()">Вперёд ➡️</button>
  </footer>
</div>

<script>
  let TEST_DATABASE = [];
  const DEFAULT_STATE = { currentIndex: 0, totalAnswered: 0, correctCount: 0, errorIds: [] };
  let AppState = JSON.parse(localStorage.getItem('notary_excel_v1')) || { ...DEFAULT_STATE };

  // Автоматическая загрузка таблицы Excel
  async function loadExcelData() {
    try {
      const fileName = encodeURIComponent('Актуальные вопросы в системе с октября 2020 года.xlsx');
      const response = await fetch(fileName);
      const arrayBuffer = await response.arrayBuffer();
      const workbook = XLSX.read(arrayBuffer, { type: 'array' });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const rawData = XLSX.utils.sheet_to_json(firstSheet);

      TEST_DATABASE = rawData.map((row, idx) => {
        const options = [];
        ['Ответ №1', 'Ответ №2', 'Ответ №3', 'Ответ №4', 'Ответ№5', 'Ответ№6'].forEach(col => {
          if (row[col] && String(row[col]).trim() !== '') {
            options.push(String(row[col]).trim());
          }
        });

        const correctIdx = row['Правильные ответы'] ? parseInt(row['Правильные ответы']) - 1 : 0;

        return {
          id: row['Ид. №.1'] || idx + 1,
          topic: `Раздел ${row['Тема'] || 1}`,
          question: String(row['Вопрос'] || '').trim(),
          options: options,
          correct: correctIdx >= 0 && correctIdx < options.length ? correctIdx : 0
        };
      }).filter(q => q.question && q.options.length > 0);

      document.getElementById('ui-total-questions').innerText = TEST_DATABASE.length;
      renderCurrentQuestion();
      renderDashboardUI();
    } catch (err) {
      document.getElementById('dynamic-content-root').innerHTML = `
        <div style="color: var(--error-red); padding: 10px; text-align: center;">
          ⚠️ Ошибка загрузки файла Excel.<br>Убедитесь, что файл "Актуальные вопросы в системе с октября 2020 года.xlsx" загружен в репозиторий GitHub.
        </div>
      `;
    }
  }

  function renderDashboardUI() {
    document.getElementById('ui-answered-count').innerText = AppState.totalAnswered;
    document.getElementById('ui-errors-count').innerText = AppState.errorIds.length;
    let accuracy = AppState.totalAnswered > 0 ? Math.round((AppState.correctCount / AppState.totalAnswered) * 100) : 0;
    document.getElementById('ui-accuracy-rate').innerText = accuracy + '%';
  }

  function renderCurrentQuestion() {
    if (TEST_DATABASE.length === 0) return;
    if (AppState.currentIndex >= TEST_DATABASE.length) AppState.currentIndex = 0;

    const q = TEST_DATABASE[AppState.currentIndex];
    document.getElementById('ui-topic-tag').innerText = q.topic;
    document.getElementById('ui-question-counter').innerText = `${AppState.currentIndex + 1} / ${TEST_DATABASE.length}`;

    let optionsHTML = q.options.map((opt, idx) => `
      <button class="opt-button" onclick="handleOptionSelect(${idx}, ${q.correct}, ${q.id}, this)">
        ${idx + 1}. ${opt}
      </button>
    `).join('');

    document.getElementById('dynamic-content-root').innerHTML = `
      <div class="question-text">${q.question}</div>
      <div class="answers-container">${optionsHTML}</div>
    `;
  }

  function handleOptionSelect(selectedIdx, correctIdx, qId, btnElement) {
    AppState.totalAnswered++;
    const allButtons = document.querySelectorAll('.opt-button');

    if (selectedIdx === correctIdx) {
      AppState.correctCount++;
      btnElement.classList.add('correct');
      setTimeout(() => { navigateNext(); }, 500);
    } else {
      if (!AppState.errorIds.includes(qId)) AppState.errorIds.push(qId);
      btnElement.classList.add('wrong');
      if (allButtons[correctIdx]) allButtons[correctIdx].classList.add('correct');
    }
    localStorage.setItem('notary_excel_v1', JSON.stringify(AppState));
    renderDashboardUI();
  }

  function navigateNext() {
    if (AppState.currentIndex < TEST_DATABASE.length - 1) AppState.currentIndex++;
    else AppState.currentIndex = 0;
    localStorage.setItem('notary_excel_v1', JSON.stringify(AppState));
    renderCurrentQuestion();
  }

  function navigatePrevious() {
    if (AppState.currentIndex > 0) AppState.currentIndex--;
    localStorage.setItem('notary_excel_v1', JSON.stringify(AppState));
    renderCurrentQuestion();
  }

  function resetFullState() {
    if (confirm("Сбросить весь прогресс?")) {
      AppState = { ...DEFAULT_STATE };
      localStorage.setItem('notary_excel_v1', JSON.stringify(AppState));
      renderCurrentQuestion();
      renderDashboardUI();
    }
  }

  window.onload = loadExcelData;
</script>
</body>
</html>
